<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waldo Coordinate Finder</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 1.5rem; background: #fdf6e3; }
  h1 { font-size: 1.3rem; }
  .controls { margin-bottom: 1rem; display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  input[type="file"] { padding: 0.3rem; }
  .wrap { position: relative; display: inline-block; cursor: crosshair; max-width: 100%; }
  .wrap img { max-width: 100%; display: block; }
  .marker { position: absolute; width: 16px; height: 16px; margin-left: -8px; margin-top: -8px; border: 3px solid red; border-radius: 50%; pointer-events: none; }
  pre { background: #1c1c1c; color: #eee; padding: 1rem; border-radius: 8px; max-width: 600px; overflow-x: auto; }
  .hint { color: #555; }
</style>
</head>
<body>
  <h1>Waldo Coordinate Finder</h1>
  <p class="hint">Load an image (e.g. a page you exported from your PDF), click directly on the target (Waldo), and copy the generated JSON snippet into <code>puzzles.json</code>.</p>
  <div class="controls">
    <input type="file" id="file-input" accept="image/*">
    <label>Radius %: <input type="number" id="radius" value="3" min="0.5" max="15" step="0.5" style="width:4rem"></label>
  </div>
  <div class="wrap" id="wrap">
    <img id="img" alt="Loaded scene">
    <div class="marker" id="marker" style="display:none"></div>
  </div>
  <h3>Snippet</h3>
  <pre id="output">Click on the image to generate coordinates.</pre>

<script>
const fileInput = document.getElementById('file-input');
const img = document.getElementById('img');
const wrap = document.getElementById('wrap');
const marker = document.getElementById('marker');
const output = document.getElementById('output');
const radiusInput = document.getElementById('radius');

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  img.src = URL.createObjectURL(file);
});

img.addEventListener('click', (evt) => {
  const rect = img.getBoundingClientRect();
  const xPercent = ((evt.clientX - rect.left) / rect.width) * 100;
  const yPercent = ((evt.clientY - rect.top) / rect.height) * 100;
  marker.style.left = xPercent + '%';
  marker.style.top = yPercent + '%';
  marker.style.display = 'block';

  const snippet = {
    id: 'my-scene',
    title: 'My Scene',
    image: 'images/my-scene.jpg',
    thumbnail: 'images/my-scene-thumb.jpg',
    target: {
      xPercent: Math.round(xPercent * 100) / 100,
      yPercent: Math.round(yPercent * 100) / 100,
      radiusPercent: parseFloat(radiusInput.value)
    }
  };
  output.textContent = JSON.stringify(snippet, null, 2);
});
</script>
</body>
</html>
